<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Product</title>
    <link rel="stylesheet" href="style/stylesheet.css" />
    <link rel="stylesheet" href="style/usersStyle.css" />
    <link rel="stylesheet" href="style/profileStyle.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div id="addingProductSectionMain">
        <div id="edit-product-subAdding">
            <h1>UPDATE PRODUCT</h1>
            <form action="products.html" id="product_editForm">
                <div id="edit-product-hBox">
                    <div id="edit-product-txt-box">
                        <input type="text" id="product-edit-productName" placeholder="Product Name" class="user-txtInput" name="productName"
                            required>
                    </div>
                    <div id="edit-product-txt-box">
                        <input type="number" id="product-edit-price" placeholder="Price" class="user-txtInput" name="price"
                            required>
                    </div>
                    <div id="edit-product-txt-box">
                        <input type="number" id="product-edit-qty" placeholder="Quantity" class="user-txtInput" name="quantity"
                            required>
                    </div>
                    <div id="edit-product-txt-box">
                        <input type="text" id="product-edit-description" placeholder="Product Description" class="user-txtInput" name="description"
                            required>
                    </div>
                    <!-- <div id="edit-product-txt-box">
                        <input type="text" placeholder="Category Name" class="user-txtInput" name="categoryName"
                            required>
                    </div> -->

                </div>
            </form>

            <div id="login-hBox-button">
                <button form="product_editForm" type="submit" id="btn_EditProduct" class="btn_addPro">Edit</button>
            </div>

        </div>
    </div>
</body>
<script src="Scripts/product.js"></script>

</html>
