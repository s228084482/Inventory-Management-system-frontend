<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Categories</title>
    <link rel="stylesheet" href="style/stylesheet.css" />
    <link rel="stylesheet" href="style/usersStyle.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div id="loadingSpinner_page" class="loading-overlay">
        <div class="spinner-page"></div>
    </div>
    <header>
        <div id="leftHeader">
            <img src="images/ims_static_img.png" alt="profile" class="profile-img">
            <div id="header-text">
                <h1>Inventory Management System</h1>
                <p>Manage your inventory</p>
            </div>
        </div>
        <div id="rightHeader">
            <a href="profile.html" class="profile-img-right">
                <img src="" alt="profile" class="profile-img-right">
            </a>
            <div id="header-text">
                <h4 id="username">Username</h1>
                    <p id="userRole">UserRole</p>
            </div>
        </div>
    </header>
    <section id="layout">
        <article id="navigationSide">
            <img src="images/ims_static_img.png" alt="profile" class="profile-img">
            <div>
                <p>Inventory Management</p>
            </div>
            <div>
                <nav>
                    <ul class="nav-list">
                        <li>
                            <a href="dashboard.html" onclick="return checkAuth()">
                                <i class="fa-solid fa-chart-line"></i>
                                <span>Dashboard</span>
                            </a>
                        </li>

                        <li>
                            <a href="products.html" onclick="return checkAuth()">
                                <i class="fa-solid fa-box"></i>
                                <span>Products</span>
                            </a>
                        </li>

                        <li>
                            <a href="categories.html" onclick="return checkAuth()">
                                <i class="fa-solid fa-layer-group"></i>
                                <span>Categories</span>
                            </a>
                        </li>

                        <li>
                            <a href="suppliers.html" onclick="return checkAuth()">
                                <i class="fa-solid fa-truck"></i>
                                <span>Suppliers</span>
                            </a>
                        </li>

                        <li>
                            <a href="stock.html" onclick="return checkAuth()">
                                <i class="fa-solid fa-warehouse"></i>
                                <span>Stock</span>
                            </a>
                        </li>

                        <li>
                            <a href="users.html" onclick="return checkAuth()">
                                <i class="fa-solid fa-users"></i>
                                <span>Users</span>
                            </a>
                        </li>

                        <li class="logout">
                            <a href="#" onclick="logout()">
                                <i class="fa-solid fa-right-from-bracket"></i>
                                <span>Logout</span>
                            </a>
                        </li>
                    </ul>
                </nav>

            </div>

        </article>
        <article id="content">
            
            <div id="loadingSpinner" style="display: none;">
                <div class="spinner">
                </div>
            </div>

            <div id="prd-main-div">

                <div id="prd-up-div">
                    <div id="leftProduct-div">
                        <input class="txt_input_categoryStyling" id="txt_categoryName" type="text" placeholder="Enter Category name...">
                        <button class="btn_styling" id="btn_addCategory">Add Category</button>
                    </div>
                    <div id="rightProduct-div">
                        <input class="txt-user-search" id="txt_searchCategory" type="search" placeholder="Search by category name"><button class="btn_styling" id="btn_searchCategory">Search</button>
                    </div>
                </div>

                <div id="prd-down-div" class="table-container">
                    
                    <table id="categoryTable" class="categoryTable1">
                        <thead>
                            <tr>
                                <th>Category Name</th>
                                <th>Product assigned</th>
                                <th>Perscentage</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">

                        </tbody>
                </div>
            </div>
        </article>
    </section>
    <script src="Scripts/category.js"></script>
    <script src="Scripts/logout.js"></script>
</body>

</html>
