<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Product</title>
    <link rel="stylesheet" href="style/stylesheet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div id="addingProductSectionMain">
        <div id="loadingSpinner_page" class="loading-overlay">
            <div class="spinner-page"></div>
        </div>
        <div id="product-subAdding">
            <h1>Assign product</h1>
            <form action="products.html" id="formProductInfo" method="get">
               
                <div id="hBox">
                    
                    <div id="txt-box2">
                       <select class="txtInputT" id="selectorSupplier" name="supplierName" required>
                        <option value="">Select Supplier</option>
                            
                        </select>
                    </div>
                </div>

                <div id="hBox">
                    
                    <div id="txt-box2">
                       <select class="txtInputT" id="selectorUser" name="user_name" required>
                        <option value="">Select User</option>
                            
                        </select>
                    </div>
                </div>

                <div id="hBox">
                    
                    <div id="txt-box2">
                        <select class="txtInputT" id="selectorMovement" name="move" required>
                            <option value="">Select Movement Type</option>
                            <option value="all">In</option>
                            <option value="status">Out</option>
                        </select>
                    </div>
                </div>

                <div id="hBox">
                    
                    <div id="txt-box2">
                       <select class="txtInputT" id="selectorCategory" name="category_name" required>
                        <option value="">Select Category</option>
                            
                        </select>
                    </div>
                </div>

                <div id="hBox-button">
                    <button form="formProductInfo" type="submit" id="btn_submitProductInfo" class="btn_addPro">Submit</button>
                </div>

            </form>

        </div>
    </div>
    
    <script src="Scripts/product_info_Script.js"></script>
</body>

</html>
