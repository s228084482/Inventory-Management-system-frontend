<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Product</title>
    <link rel="stylesheet" href="style/stylesheet.css" />
    <link rel="stylesheet" href="style/usersStyle.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div id="popup" class="popup">
        <div class="popup-content">
            <span class="close-btn" id="close-btn" onclick="closePopup('popup')">X</span>
            <h2 id="popup-title"></h2>
            <p id="popup-message">This is a simple popup message.</p>
        </div>
    </div>

    <header>
        <div id="leftHeader">
            <img src="images/ims_static_img.png" alt="profile" class="profile-img">
            <div id="header-text">
                <h1>Inventory Management System</h1>
                <p>Manage your inventory</p>
            </div>
        </div>
        <div id="rightHeader">
            <a href="profile.html" class="profile-img-right">
                <img src="" alt="profile" class="profile-img-right">
            </a>
            <div id="header-text">
                <h4 id="username">Username</h1>
                    <p id="userRole">UserRole</p>
            </div>
        </div>
    </header>
    <section id="layout">
        <article id="navigationSide">
            <img src="images/ims_static_img.png" alt="profile" class="profile-img">
            <div>
                <p>Inventory Management</p>
            </div>
            <div>
                <nav>
                    <ul class="nav-list">
                        <li>
                            <a href="dashboard.html" onclick="return checkAuth()">
                                <i class="fa-solid fa-chart-line"></i>
                                <span>Dashboard</span>
                            </a>
                        </li>

                        <li>
                            <a href="products.html" onclick="return checkAuth()">
                                <i class="fa-solid fa-box"></i>
                                <span>Products</span>
                            </a>
                        </li>

                        <li>
                            <a href="categories.html" onclick="return checkAuth()">
                                <i class="fa-solid fa-layer-group"></i>
                                <span>Categories</span>
                            </a>
                        </li>

                        <li>
                            <a href="suppliers.html" onclick="return checkAuth()">
                                <i class="fa-solid fa-truck"></i>
                                <span>Suppliers</span>
                            </a>
                        </li>

                        <li>
                            <a href="stock.html" onclick="return checkAuth()">
                                <i class="fa-solid fa-warehouse"></i>
                                <span>Stock</span>
                            </a>
                        </li>

                        <li>
                            <a href="users.html" onclick="return checkAuth()">
                                <i class="fa-solid fa-users"></i>
                                <span>Users</span>
                            </a>
                        </li>

                        <li class="logout">
                            <a href="#" onclick="logout()">
                                
                                <span>Logout</span>
                            </a>
                        </li>
                    </ul>
                </nav>

            </div>

        </article>
        <article id="content">
            <div id="prd-main-div">

                <div id="prd-up-div">
                    <div id="leftProduct-div">
                        <button id="btn_addProduct">Add new product</button>
                        <select id="filter-gropdown">
                            <option ><i class="fas-solid fa-filter"></i> Status</option>
                            <option value="all">All</option>
                            <option value="avilable">Available</option>
                            <option value="notAvailable">Not Available</option>
                        </select>
                        
                    </div>
                    <div id="rightProduct-div">
                        <input id="txt_search" type="search" placeholder="Search by product name"><button id="btn_searchProduct">Search</button>
                    </div>
                </div>

                <div id="prd-down-div">

                    <div id="loadingSpinner" style="display: none;">
                        <div class="spinner" >
                        </div>
                    </div>

                    <table id="productTable" class="categoryTable1">
                        
                        <thead>
                            <tr>
                                <th>Product Name</th>
                                <th>Price</th>
                                <th>Description</th>
                                <th>Quantity</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">

                        </tbody>
                    </table>
                </div>
            </div>
        </article>
    </section>
    <script src="Scripts/styling_script.js"></script>
    <script src="Scripts/product.js"></script>
    <script src="Scripts/logout.js"></script>
</body>

</html>
