<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Stock</title>
    <link rel="stylesheet" href="style/stylesheet.css" />
    <link rel="stylesheet" href="style/stockStyle.css" />
    <link rel="stylesheet" href="style/usersStyle.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header>
        <div id="leftHeader">
            <img src="images/ims_static_img.png" alt="profile" class="profile-img">
            <div id="header-text">
                <h1>Inventory Management System</h1>
                <p>Manage your inventory</p>
            </div>
        </div>
        <div id="rightHeader">
            <a href="profile.html" class="profile-img-right">
                <img src="" alt="profile" class="profile-img-right">
            </a>
            <div id="header-text">
                <h4 id="username">Username</h1>
                    <p id="userRole">UserRole</p>
            </div>
        </div>
    </header>
    <section id="layout">
        <article id="navigationSide">
            <img src="images/ims_static_img.png" alt="profile" class="profile-img">
            <div>
                <p>Inventory Management</p>
            </div>
            <div>
                <nav>
                    <ul class="nav-list">
                        <li>
                            <a href="dashboard.html" onclick="return checkAuth()">
                                <i class="fa-solid fa-chart-line"></i>
                                <span>Dashboard</span>
                            </a>
                        </li>

                        <li>
                            <a href="products.html" onclick="return checkAuth()">
                                <i class="fa-solid fa-box"></i>
                                <span>Products</span>
                            </a>
                        </li>

                        <li>
                            <a href="categories.html" onclick="return checkAuth()">
                                <i class="fa-solid fa-layer-group"></i>
                                <span>Categories</span>
                            </a>
                        </li>

                        <li>
                            <a href="suppliers.html" onclick="return checkAuth()">
                                <i class="fa-solid fa-truck"></i>
                                <span>Suppliers</span>
                            </a>
                        </li>

                        <li>
                            <a href="stock.html" onclick="return checkAuth()">
                                <i class="fa-solid fa-warehouse"></i>
                                <span>Stock</span>
                            </a>
                        </li>

                        <li>
                            <a href="users.html" onclick="return checkAuth()">
                                <i class="fa-solid fa-users"></i>
                                <span>Users</span>
                            </a>
                        </li>

                        <li class="logout">
                            <a href="#" onclick="logout()">
                                <i class="fa-solid fa-right-from-bracket"></i>
                                <span>Logout</span>
                            </a>
                        </li>
                    </ul>
                </nav>

            </div>

        </article>
        <article id="content">
            <div class="stock-history-main">
                <div class="stock-top-content">
                    <button id="btn_in"  class="stock_btns">Stock IN</button>
                    <button id="btn_Out"  class="stock_btns">Stock OUT</button>
                </div>
                <div class="stock-bottom-content">

                    <div class="user-table-container">
                        <table id="stockTable" class="user-Table">
                        <thead>
                            <tr>
                                <th>STOCK HISTORY</th>
                            </tr>
                        </thead>
                        <tbody>

                        </tbody>
                    </table>
                    </div>

                </div>
            </div>
        </article>
    </section>
    <script src="Scripts/stock.js"></script>
    <script src="Scripts/logout.js"></script>
</body>

</html>
