<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>Decrement products</title>
    <link rel="stylesheet" href="style/stylesheet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <div id="addingProductSectionMain">
        <div id="loadingSpinner_page" class="loading-overlay">
            <div class="spinner-page"></div>
        </div>
        <div id="subAddingIncreament">
            <h1 class="increamentH1">Decrement products</h1>
            <form method="get" id="stockOUTForm">
                <div id="hBox">
                    <div id="txt-box">
                        <select class="txtInputSelector" id="selectorStockOUT" name="product_name" required>
                            <option value="">Select Product</option>
                        </select>
                    </div>
                </div>

                <div id="hBox">
                    <div id="txt-box">
                        <input type="number" placeholder="Quantity Out" class="txtInput" name="quantity" required>
                    </div>
                </div>

            </form>

            <div id="hBox-button">
                <button form="stockOUTForm" type="submit" id="btn_Out" class="btn_addPro">Stock Out</button>
            </div>

        </div>
    </div>
</body>
<script src="Scripts/stockMovement.js"></script>
</html>
